<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Đăng Nhập | FoodieMenu</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    * { box-sizing: border-box; }

    :root {
      --brand: #ff6b35;
      --brand-2: #ffd166;
      --green: #06d6a0;
      --dark: #08080f;
      --line: rgba(255, 255, 255, 0.16);
      --soft: rgba(255, 255, 255, 0.68);
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(255, 107, 53, 0.22), transparent 28%),
        linear-gradient(315deg, rgba(6, 214, 160, 0.12), transparent 30%),
        radial-gradient(circle at 50% 0%, rgba(255, 209, 102, 0.13), transparent 38%),
        #08080f;
    }

    .scene {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: -20%;
      background-image:
        linear-gradient(rgba(255,255,255,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 52px 52px;
      transform: perspective(700px) rotateX(62deg) translateY(-90px);
      transform-origin: top;
      animation: gridMove 12s linear infinite;
      opacity: 0.45;
    }

    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 0%, rgba(255,255,255,0.12) 45%, transparent 62%);
      transform: translateX(-120%);
      animation: lightSweep 7s ease-in-out infinite;
      opacity: 0.35;
    }

    .spark {
      position: fixed;
      width: 9px;
      height: 9px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,107,53,0.18);
      animation: sparkFloat 8s ease-in-out infinite;
      pointer-events: none;
    }

    .spark.s1 { top: 14%; left: 12%; animation-delay: -1s; }
    .spark.s2 { top: 22%; right: 15%; background: rgba(6,214,160,0.16); animation-delay: -3s; }
    .spark.s3 { bottom: 18%; left: 18%; background: rgba(255,209,102,0.16); animation-delay: -5s; }
    .spark.s4 { bottom: 23%; right: 18%; animation-delay: -2s; }

    .meteor {
      position: fixed;
      top: -80px;
      width: 2px;
      height: 90px;
      border-radius: 999px;
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.72), rgba(255,107,53,0));
      filter: drop-shadow(0 0 8px rgba(255, 209, 102, 0.42));
      animation: meteorFall 7.5s linear infinite;
      z-index: 0;
    }

    .meteor.m1 { left: 18%; animation-delay: 0.8s; }
    .meteor.m2 { left: 72%; animation-delay: 4.2s; animation-duration: 9s; }
    .meteor.m3 { left: 46%; animation-delay: 8s; animation-duration: 10s; }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to { background-position: 52px 52px; }
    }

    @keyframes lightSweep {
      0%, 45% { transform: translateX(-120%); }
      75%, 100% { transform: translateX(120%); }
    }

    @keyframes sparkFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.45; }
      50% { transform: translateY(-22px) rotate(45deg); opacity: 0.9; }
    }

    @keyframes meteorFall {
      0% {
        opacity: 0;
        transform: translate3d(0, -40px, 0) rotate(38deg);
      }

      8% {
        opacity: 0.55;
      }

      20% {
        opacity: 0.22;
      }

      34%, 100% {
        opacity: 0;
        transform: translate3d(340px, 560px, 0) rotate(38deg);
      }
    }

    .auth-wrap {
      width: min(100%, 480px);
      position: relative;
      z-index: 1;
      animation: cardIn 520ms ease both;
    }

    .auth-wrap::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 26px;
      background: linear-gradient(135deg, rgba(255,107,53,0.7), rgba(255,209,102,0.35), rgba(6,214,160,0.38));
      filter: blur(10px);
      opacity: 0.55;
      animation: glowPulse 4s ease-in-out infinite;
    }

    .auth-box {
      position: relative;
      padding: 30px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.115), rgba(255,255,255,0.07));
      border: 1px solid var(--line);
      box-shadow: 0 28px 90px rgba(0,0,0,0.52);
      backdrop-filter: blur(22px);
      overflow: hidden;
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }

    .auth-box:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 209, 102, 0.28);
      box-shadow:
        0 32px 100px rgba(0,0,0,0.56),
        0 0 34px rgba(255,107,53,0.12);
    }

    .auth-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(255,255,255,0.16), transparent 38%);
      opacity: 0.45;
      pointer-events: none;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.42; }
      50% { opacity: 0.72; }
    }

    .brand {
      position: relative;
      text-align: center;
      margin-bottom: 22px;
    }

    .brand-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--brand), #ff8f5e);
      box-shadow: 0 16px 38px rgba(255,107,53,0.36);
      font-size: 1.8rem;
      animation: iconLift 3.4s ease-in-out infinite;
    }

    @keyframes iconLift {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .brand h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--soft);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .main-tabs,
    .mini-tabs {
      position: relative;
      display: grid;
      gap: 8px;
      padding: 6px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .main-tabs {
      grid-template-columns: 1fr 1fr;
      margin-bottom: 16px;
    }

    .mini-tabs {
      grid-template-columns: 1fr 1fr;
      margin-bottom: 16px;
    }

    .tab-btn,
    .mini-btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 8px;
      background: transparent;
      color: rgba(255,255,255,0.72);
      font-weight: 850;
      transition: 180ms ease;
    }

    .tab-btn:hover,
    .mini-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
    }

    .tab-btn.active,
    .mini-btn.active {
      color: #fff;
      background: linear-gradient(135deg, var(--brand), #ff8f5e);
      box-shadow: 0 12px 26px rgba(255,107,53,0.28);
      transform: translateY(-1px);
    }

    .panel {
      position: relative;
      display: none;
      animation: panelIn 240ms ease both;
    }

    .panel.active { display: block; }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(9px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-label {
      font-size: 0.92rem;
      font-weight: 750;
      color: rgba(255,255,255,0.9);
    }

    .form-control {
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.95);
      color: #111827;
      font-weight: 650;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .form-control:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 107, 53, 0.55);
      box-shadow:
        0 10px 26px rgba(0, 0, 0, 0.18),
        0 0 0 4px rgba(255, 107, 53, 0.08);
      background: #fff;
    }

    .form-control:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 0.22rem rgba(255,107,53,0.18);
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap .form-control {
      padding-right: 46px;
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 8px;
      width: 36px;
      height: 36px;
      transform: translateY(-50%);
      border: 0;
      border-radius: 10px;
      color: #6b7280;
      background: transparent;
    }

    .toggle-password:hover {
      color: #111827;
      background: rgba(0,0,0,0.07);
    }

    .btn-brand {
      position: relative;
      overflow: hidden;
      min-height: 49px;
      border: 0;
      border-radius: 14px;
      color: #fff;
      font-weight: 900;
      background: linear-gradient(135deg, var(--brand), #ff8f5e);
      box-shadow: 0 14px 30px rgba(255,107,53,0.32);
      transition: 180ms ease;
    }

    .btn-brand::after {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 70%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: skewX(-18deg);
      transition: 420ms ease;
    }

    .btn-brand:hover {
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 18px 36px rgba(255,107,53,0.38);
    }

    .btn-brand:hover::after {
      left: 130%;
    }

    .btn-brand:active {
      transform: translateY(0);
    }

    .alert {
      border: 0;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .auth-alert {
      display: none;
    }

    .strength {
      display: none;
      margin-top: 8px;
    }

    .strength-bar {
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      overflow: hidden;
    }

    .strength-fill {
      width: 0;
      height: 100%;
      border-radius: inherit;
      transition: 180ms ease;
    }

    .strength-text {
      display: block;
      margin-top: 6px;
      color: var(--soft);
      font-size: 0.82rem;
      font-weight: 750;
    }

    .caps-warning {
      display: none;
      margin-top: 7px;
      color: var(--brand-2);
      font-size: 0.83rem;
      font-weight: 750;
    }

    .loader {
      width: 18px;
      height: 18px;
      display: none;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.36);
      border-top-color: #fff;
      animation: spin 650ms linear infinite;
    }

    .btn-loading .loader {
      display: inline-block;
    }

    .btn-loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: rgba(255,255,255,0.64);
      text-decoration: none;
      font-weight: 800;
      transition: 180ms ease;
    }

    .back-link:hover {
      color: var(--brand-2);
      transform: translateX(-2px);
    }

    @media (max-width: 520px) {
      body { padding: 14px; }

      .auth-box {
        padding: 24px 18px;
        border-radius: 20px;
      }

      .brand h1 {
        font-size: 1.48rem;
      }

      .tab-btn,
      .mini-btn {
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>
  <div class="scene"></div>

  <span class="meteor m1"></span>
  <span class="meteor m2"></span>
  <span class="meteor m3"></span>

  <span class="spark s1"></span>
  <span class="spark s2"></span>
  <span class="spark s3"></span>
  <span class="spark s4"></span>

  <main class="auth-wrap">
    <section class="auth-box">
      <div class="brand">
        <div class="brand-icon">
          <i class="bi bi-egg-fried"></i>
        </div>
        <h1>FoodieMenu</h1>
        <p>Đăng nhập để tiếp tục</p>
      </div>

      <div class="main-tabs">
        <button type="button" class="tab-btn active" id="adminTab">
          <i class="bi bi-shield-lock me-1"></i>Quản trị
        </button>
        <button type="button" class="tab-btn" id="userTab">
          <i class="bi bi-person me-1"></i>Người dùng
        </button>
      </div>

      <section class="panel active" id="adminPanel">
        <div class="mini-tabs">
          <button type="button" class="mini-btn active" id="adminLoginTab">Đăng nhập</button>
          <button type="button" class="mini-btn" id="adminChangeTab">Đổi mật khẩu</button>
        </div>

        <form id="adminLoginForm" autocomplete="off">
          <div class="mb-3">
            <label class="form-label" for="adminUsername">Tài khoản quản trị</label>
            <input type="text" class="form-control" id="adminUsername" placeholder="Nhập tài khoản admin" required>
          </div>

          <div class="mb-3">
            <label class="form-label" for="adminPassword">Mật khẩu quản trị</label>
            <div class="password-wrap">
              <input type="password" class="form-control" id="adminPassword" placeholder="Nhập mật khẩu admin" required>
              <button type="button" class="toggle-password" data-target="adminPassword">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <div class="caps-warning" id="adminCapsWarning">
              <i class="bi bi-exclamation-triangle me-1"></i>Caps Lock đang bật
            </div>
          </div>

          <div id="adminError" class="alert alert-danger auth-alert mb-3"></div>

          <button type="submit" class="btn btn-brand w-100" id="adminLoginBtn">
            <span class="loader me-2"></span>
            <span class="btn-text">
              <i class="bi bi-box-arrow-in-right me-1"></i>Đăng Nhập Quản Trị
            </span>
          </button>
        </form>

        <form id="adminChangeForm" autocomplete="off" style="display:none;">
          <div class="mb-3">
            <label class="form-label" for="currentAdminPassword">Mật khẩu hiện tại</label>
            <div class="password-wrap">
              <input type="password" class="form-control" id="currentAdminPassword" placeholder="Nhập mật khẩu hiện tại" required>
              <button type="button" class="toggle-password" data-target="currentAdminPassword">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="newAdminPassword">Mật khẩu mới</label>
            <div class="password-wrap">
              <input type="password" class="form-control" id="newAdminPassword" placeholder="Tối thiểu 8 ký tự" required>
              <button type="button" class="toggle-password" data-target="newAdminPassword">
                <i class="bi bi-eye"></i>
              </button>
            </div>

            <div class="strength" id="adminStrength">
              <div class="strength-bar">
                <div class="strength-fill" id="adminStrengthFill"></div>
              </div>
              <span class="strength-text" id="adminStrengthText"></span>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="confirmAdminPassword">Nhập lại mật khẩu mới</label>
            <input type="password" class="form-control" id="confirmAdminPassword" placeholder="Nhập lại mật khẩu mới" required>
          </div>

          <div id="adminChangeMsg" class="alert auth-alert mb-3"></div>

          <button type="submit" class="btn btn-brand w-100">
            <i class="bi bi-save me-1"></i>Lưu Mật Khẩu
          </button>
        </form>
      </section>

      <section class="panel" id="userPanel">
        <div class="mini-tabs">
          <button type="button" class="mini-btn active" id="userLoginTab">Đăng nhập</button>
          <button type="button" class="mini-btn" id="userRegisterTab">Đăng ký</button>
        </div>

        <form id="userLoginForm" autocomplete="off">
          <div class="mb-3">
            <label class="form-label" for="userLoginEmail">Email</label>
            <input type="email" class="form-control" id="userLoginEmail" placeholder="Nhập email đã đăng ký" required>
          </div>

          <div class="mb-3">
            <label class="form-label" for="userLoginPassword">Mật khẩu</label>
            <div class="password-wrap">
              <input type="password" class="form-control" id="userLoginPassword" placeholder="Nhập mật khẩu" required>
              <button type="button" class="toggle-password" data-target="userLoginPassword">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <div class="caps-warning" id="userCapsWarning">
              <i class="bi bi-exclamation-triangle me-1"></i>Caps Lock đang bật
            </div>
          </div>

          <div id="userLoginError" class="alert alert-danger auth-alert mb-3"></div>

          <button type="submit" class="btn btn-brand w-100" id="userLoginBtn">
            <span class="loader me-2"></span>
            <span class="btn-text">
              <i class="bi bi-person-check me-1"></i>Đăng Nhập Người Dùng
            </span>
          </button>
        </form>

        <form id="userRegisterForm" autocomplete="off" style="display:none;">
          <div class="mb-3">
            <label class="form-label" for="registerName">Họ tên</label>
            <input type="text" class="form-control" id="registerName" placeholder="Nhập họ tên" required>
          </div>

          <div class="mb-3">
            <label class="form-label" for="registerEmail">Email</label>
            <input type="email" class="form-control" id="registerEmail" placeholder="Nhập email" required>
          </div>

          <div class="mb-3">
            <label class="form-label" for="registerPhone">Số điện thoại</label>
            <input type="tel" class="form-control" id="registerPhone" placeholder="Nhập số điện thoại">
          </div>

          <div class="mb-3">
            <label class="form-label" for="registerPassword">Mật khẩu</label>
            <div class="password-wrap">
              <input type="password" class="form-control" id="registerPassword" placeholder="Tối thiểu 8 ký tự" required>
              <button type="button" class="toggle-password" data-target="registerPassword">
                <i class="bi bi-eye"></i>
              </button>
            </div>

            <div class="strength" id="userStrength">
              <div class="strength-bar">
                <div class="strength-fill" id="userStrengthFill"></div>
              </div>
              <span class="strength-text" id="userStrengthText"></span>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="registerConfirmPassword">Nhập lại mật khẩu</label>
            <input type="password" class="form-control" id="registerConfirmPassword" placeholder="Nhập lại mật khẩu" required>
          </div>

          <div id="registerError" class="alert alert-danger auth-alert mb-3"></div>
          <div id="registerSuccess" class="alert alert-success auth-alert mb-3"></div>

          <button type="submit" class="btn btn-brand w-100">
            <i class="bi bi-person-plus me-1"></i>Đăng Ký
          </button>
        </form>
      </section>

      <div class="text-center mt-4">
        <a href="index.html" class="back-link">
          <i class="bi bi-arrow-left"></i>Quay lại trang chủ
        </a>
      </div>
    </section>
  </main>

  <script>
    const DEFAULT_ADMIN_USERNAME = "admin";
    const DEFAULT_ADMIN_PASSWORD = "123456";
    const MAX_LOGIN_ATTEMPTS = 5;
    const LOCK_TIME_MS = 60 * 1000;

    const adminTab = document.getElementById("adminTab");
    const userTab = document.getElementById("userTab");
    const adminPanel = document.getElementById("adminPanel");
    const userPanel = document.getElementById("userPanel");

    const adminLoginTab = document.getElementById("adminLoginTab");
    const adminChangeTab = document.getElementById("adminChangeTab");
    const adminLoginForm = document.getElementById("adminLoginForm");
    const adminChangeForm = document.getElementById("adminChangeForm");

    const userLoginTab = document.getElementById("userLoginTab");
    const userRegisterTab = document.getElementById("userRegisterTab");
    const userLoginForm = document.getElementById("userLoginForm");
    const userRegisterForm = document.getElementById("userRegisterForm");

    function getAdminAccount() {
      const savedAccount = localStorage.getItem("foodieAdminAccount");

      if (!savedAccount) {
        return {
          username: DEFAULT_ADMIN_USERNAME,
          password: DEFAULT_ADMIN_PASSWORD
        };
      }

      try {
        return JSON.parse(savedAccount);
      } catch (error) {
        return {
          username: DEFAULT_ADMIN_USERNAME,
          password: DEFAULT_ADMIN_PASSWORD
        };
      }
    }

    function saveAdminAccount(account) {
      localStorage.setItem("foodieAdminAccount", JSON.stringify(account));
    }

    function getUsers() {
      try {
        return JSON.parse(localStorage.getItem("foodieUsers") || "[]");
      } catch (error) {
        return [];
      }
    }

    function saveUsers(users) {
      localStorage.setItem("foodieUsers", JSON.stringify(users));
    }

    function showMessage(element, message, type) {
      element.textContent = message;
      element.className = "alert alert-" + type + " auth-alert mb-3";
      element.style.display = "block";
    }

    function hideMessage(element) {
      element.textContent = "";
      element.style.display = "none";
    }

    function setLoading(button, isLoading) {
      button.classList.toggle("btn-loading", isLoading);
      button.disabled = isLoading;
    }

    function getAttemptsKey(type, account) {
      return "foodieAttempts_" + type + "_" + account;
    }

    function getLockKey(type, account) {
      return "foodieLock_" + type + "_" + account;
    }

    function isLocked(type, account) {
      const lockedUntil = Number(localStorage.getItem(getLockKey(type, account)) || 0);
      return Date.now() < lockedUntil;
    }

    function getRemainingSeconds(type, account) {
      const lockedUntil = Number(localStorage.getItem(getLockKey(type, account)) || 0);
      return Math.max(1, Math.ceil((lockedUntil - Date.now()) / 1000));
    }

    function addFailedAttempt(type, account) {
      const attemptsKey = getAttemptsKey(type, account);
      const attempts = Number(localStorage.getItem(attemptsKey) || 0) + 1;

      if (attempts >= MAX_LOGIN_ATTEMPTS) {
        localStorage.setItem(getLockKey(type, account), String(Date.now() + LOCK_TIME_MS));
        localStorage.removeItem(attemptsKey);
        return 0;
      }

      localStorage.setItem(attemptsKey, String(attempts));
      return MAX_LOGIN_ATTEMPTS - attempts;
    }

    function clearAttempts(type, account) {
      localStorage.removeItem(getAttemptsKey(type, account));
      localStorage.removeItem(getLockKey(type, account));
    }

    function switchMain(type) {
      const isAdmin = type === "admin";

      adminTab.classList.toggle("active", isAdmin);
      userTab.classList.toggle("active", !isAdmin);
      adminPanel.classList.toggle("active", isAdmin);
      userPanel.classList.toggle("active", !isAdmin);
    }

    function switchAdmin(mode) {
      const isLogin = mode === "login";

      adminLoginTab.classList.toggle("active", isLogin);
      adminChangeTab.classList.toggle("active", !isLogin);
      adminLoginForm.style.display = isLogin ? "block" : "none";
      adminChangeForm.style.display = isLogin ? "none" : "block";
    }

    function switchUser(mode) {
      const isLogin = mode === "login";

      userLoginTab.classList.toggle("active", isLogin);
      userRegisterTab.classList.toggle("active", !isLogin);
      userLoginForm.style.display = isLogin ? "block" : "none";
      userRegisterForm.style.display = isLogin ? "none" : "block";
    }

    function passwordStrength(password) {
      let score = 0;

      if (password.length >= 8) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[a-z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;

      if (score <= 2) {
        return { label: "Mật khẩu yếu", color: "#ef4444", width: "35%" };
      }

      if (score <= 4) {
        return { label: "Mật khẩu khá", color: "#f59e0b", width: "68%" };
      }

      return { label: "Mật khẩu mạnh", color: "#16a34a", width: "100%" };
    }

    function bindStrength(inputId, boxId, fillId, textId) {
      const input = document.getElementById(inputId);
      const box = document.getElementById(boxId);
      const fill = document.getElementById(fillId);
      const text = document.getElementById(textId);

      input.addEventListener("input", function () {
        if (!input.value) {
          box.style.display = "none";
          fill.style.width = "0";
          text.textContent = "";
          return;
        }

        const result = passwordStrength(input.value);

        box.style.display = "block";
        fill.style.width = result.width;
        fill.style.background = result.color;
        text.textContent = result.label;
      });
    }

    function bindCaps(inputId, warningId) {
      const input = document.getElementById(inputId);
      const warning = document.getElementById(warningId);

      input.addEventListener("keyup", function (event) {
        warning.style.display = event.getModifierState && event.getModifierState("CapsLock") ? "block" : "none";
      });

      input.addEventListener("blur", function () {
        warning.style.display = "none";
      });
    }

    document.querySelectorAll(".toggle-password").forEach(function (button) {
      button.addEventListener("click", function () {
        const input = document.getElementById(button.dataset.target);
        const isPassword = input.type === "password";

        input.type = isPassword ? "text" : "password";
        button.innerHTML = isPassword
          ? '<i class="bi bi-eye-slash"></i>'
          : '<i class="bi bi-eye"></i>';
      });
    });

    adminTab.addEventListener("click", function () {
      switchMain("admin");
    });

    userTab.addEventListener("click", function () {
      switchMain("user");
    });

    adminLoginTab.addEventListener("click", function () {
      switchAdmin("login");
    });

    adminChangeTab.addEventListener("click", function () {
      switchAdmin("change");
    });

    userLoginTab.addEventListener("click", function () {
      switchUser("login");
    });

    userRegisterTab.addEventListener("click", function () {
      switchUser("register");
    });

    bindStrength("newAdminPassword", "adminStrength", "adminStrengthFill", "adminStrengthText");
    bindStrength("registerPassword", "userStrength", "userStrengthFill", "userStrengthText");
    bindCaps("adminPassword", "adminCapsWarning");
    bindCaps("userLoginPassword", "userCapsWarning");

    adminLoginForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const errorBox = document.getElementById("adminError");
      const loginBtn = document.getElementById("adminLoginBtn");
      const username = document.getElementById("adminUsername").value.trim();
      const password = document.getElementById("adminPassword").value;
      const account = getAdminAccount();

      hideMessage(errorBox);

      if (isLocked("admin", username)) {
        showMessage(errorBox, "Bạn nhập sai quá nhiều lần. Thử lại sau " + getRemainingSeconds("admin", username) + " giây.", "danger");
        return;
      }

      setLoading(loginBtn, true);

      setTimeout(function () {
        if (username === account.username && password === account.password) {
          clearAttempts("admin", username);
          sessionStorage.setItem("isAdminLoggedIn", "true");
          window.location.href = "admin/index.html";
          return;
        }

        const remaining = addFailedAttempt("admin", username);
        setLoading(loginBtn, false);

        if (remaining === 0) {
          showMessage(errorBox, "Bạn nhập sai quá nhiều lần. Tài khoản bị khóa tạm thời 1 phút.", "danger");
          return;
        }

        showMessage(errorBox, "Sai tài khoản hoặc mật khẩu quản trị. Bạn còn " + remaining + " lần thử.", "danger");
      }, 520);
    });

    adminChangeForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const msg = document.getElementById("adminChangeMsg");
      const currentPassword = document.getElementById("currentAdminPassword").value;
      const newPassword = document.getElementById("newAdminPassword").value;
      const confirmPassword = document.getElementById("confirmAdminPassword").value;
      const account = getAdminAccount();

      hideMessage(msg);

      if (currentPassword !== account.password) {
        showMessage(msg, "Mật khẩu hiện tại không đúng.", "danger");
        return;
      }

      if (newPassword.length < 8) {
        showMessage(msg, "Mật khẩu mới phải có tối thiểu 8 ký tự.", "danger");
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage(msg, "Mật khẩu nhập lại không khớp.", "danger");
        return;
      }

      saveAdminAccount({
        username: account.username,
        password: newPassword
      });

      adminChangeForm.reset();
      document.getElementById("adminStrength").style.display = "none";
      showMessage(msg, "Đổi mật khẩu thành công.", "success");
    });

    userRegisterForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const errorBox = document.getElementById("registerError");
      const successBox = document.getElementById("registerSuccess");
      const name = document.getElementById("registerName").value.trim();
      const email = document.getElementById("registerEmail").value.trim().toLowerCase();
      const phone = document.getElementById("registerPhone").value.trim();
      const password = document.getElementById("registerPassword").value;
      const confirmPassword = document.getElementById("registerConfirmPassword").value;

      hideMessage(errorBox);
      hideMessage(successBox);

      if (name.length < 2) {
        showMessage(errorBox, "Vui lòng nhập họ tên hợp lệ.", "danger");
        return;
      }

      if (password.length < 8) {
        showMessage(errorBox, "Mật khẩu phải có tối thiểu 8 ký tự.", "danger");
        return;
      }

      if (password !== confirmPassword) {
        showMessage(errorBox, "Mật khẩu nhập lại không khớp.", "danger");
        return;
      }

      const users = getUsers();
      const existedUser = users.find(function (user) {
        return user.email === email;
      });

      if (existedUser) {
        showMessage(errorBox, "Email này đã được đăng ký.", "danger");
        return;
      }

      users.push({
        name: name,
        email: email,
        phone: phone,
        password: password,
        createdAt: new Date().toISOString()
      });

      saveUsers(users);
      userRegisterForm.reset();
      document.getElementById("userStrength").style.display = "none";
      showMessage(successBox, "Đăng ký thành công. Bạn có thể đăng nhập.", "success");

      setTimeout(function () {
        switchUser("login");
        document.getElementById("userLoginEmail").value = email;
      }, 850);
    });

    userLoginForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const errorBox = document.getElementById("userLoginError");
      const loginBtn = document.getElementById("userLoginBtn");
      const email = document.getElementById("userLoginEmail").value.trim().toLowerCase();
      const password = document.getElementById("userLoginPassword").value;

      hideMessage(errorBox);

      if (isLocked("user", email)) {
        showMessage(errorBox, "Bạn nhập sai quá nhiều lần. Thử lại sau " + getRemainingSeconds("user", email) + " giây.", "danger");
        return;
      }

      setLoading(loginBtn, true);

      setTimeout(function () {
        const users = getUsers();
        const matchedUser = users.find(function (user) {
          return user.email === email && user.password === password;
        });

        if (!matchedUser) {
          const remaining = addFailedAttempt("user", email);
          setLoading(loginBtn, false);

          if (remaining === 0) {
            showMessage(errorBox, "Bạn nhập sai quá nhiều lần. Tài khoản bị khóa tạm thời 1 phút.", "danger");
            return;
          }

          showMessage(errorBox, "Tài khoản chưa đăng ký hoặc mật khẩu không đúng. Bạn còn " + remaining + " lần thử.", "danger");
          return;
        }

        clearAttempts("user", email);

        sessionStorage.setItem("isUserLoggedIn", "true");
        sessionStorage.setItem("currentUser", JSON.stringify({
          name: matchedUser.name,
          email: matchedUser.email,
          phone: matchedUser.phone || ""
        }));

        window.location.href = "index.html";
      }, 520);
    });
  </script>
</body>
